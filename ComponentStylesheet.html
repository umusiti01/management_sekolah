<style>

    border: 1px solid rgba(15, 76, 129, 0.14);

    bottom: 24px;

    border-radius: 14px;

    pointer-events: none;
    transform: translateY(12px);

  .toast.show {

    transform: translateY(0);

    .panel-head,

      flex-direction: column;
      align-items: stretch;
